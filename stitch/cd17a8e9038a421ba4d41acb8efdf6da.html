<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            overflow: hidden; /* Prevent scrolling on gameplay screen */
            margin: 0;
            padding: 0;
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        /* Glass Panel Styling */
        .glass-panel {
            background-color: rgba(11, 14, 20, 0.75); /* surface-container-lowest with opacity */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 219, 233, 0.2); /* Low opacity primary cyan */
        }

        /* Neon Glow Utility */
        .neon-glow-primary {
            box-shadow: 0 0 10px rgba(0, 219, 233, 0.5), 0 0 20px rgba(0, 219, 233, 0.3);
        }
        .neon-glow-secondary {
            box-shadow: 0 0 10px rgba(255, 36, 228, 0.5), 0 0 20px rgba(255, 36, 228, 0.3);
        }
        
        .neon-text-primary {
            text-shadow: 0 0 5px rgba(0, 219, 233, 0.8);
        }

        /* Playfield grid background */
        .playfield-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 219, 233, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 219, 233, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
        }

        /* Glowing Rails */
        .rail-track {
            position: absolute;
            background-color: rgba(0, 219, 233, 0.2);
            border-radius: 2px;
        }
        .rail-track.active {
            background-color: theme('colors.primary-fixed-dim');
            box-shadow: 0 0 8px theme('colors.primary-fixed-dim');
        }

        /* Light Train */
        .light-train {
            position: absolute;
            background-color: theme('colors.secondary-container');
            box-shadow: 0 0 15px theme('colors.secondary-container'), 0 0 30px theme('colors.secondary-container');
            border-radius: 4px;
            z-index: 10;
        }
        
        /* Rail Switch */
        .rail-switch {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: theme('colors.surface-container');
            border: 2px solid theme('colors.secondary');
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            cursor: pointer;
            transition: all 0.2s;
        }
        .rail-switch:hover {
            background-color: theme('colors.secondary');
            box-shadow: 0 0 10px theme('colors.secondary');
        }

        /* Glitch Animation for Status */
        @keyframes subtleGlitch {
            0% { transform: translate(0) }
            20% { transform: translate(-1px, 1px) }
            40% { transform: translate(-1px, -1px) }
            60% { transform: translate(1px, 1px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }
        .glitch-hover:hover {
            animation: subtleGlitch 0.2s infinite;
        }

    </style>
</head>
<body class="antialiased selection:bg-primary-container selection:text-on-primary-container">
<div class="scanlines"></div>
<!-- Playfield Canvas (Background & Rails) -->
<div class="fixed inset-0 z-0 bg-surface-dim overflow-hidden flex items-center justify-center">
<div class="playfield-grid"></div>
<!-- Background Image for depth/texture -->

</div>

<!-- Horizontal Main Rail -->

<div class="rail-track h-1 w-48 bottom-1/4 right-1/3 transform -rotate-12 origin-right"></div>

</div>
</div>

<!-- Script for minor visual interaction simulation -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const switches = document.querySelectorAll('.rail-switch');
            switches.forEach(sw => {
                sw.addEventListener('click', () => {
                    // Toggle appearance to simulate switching
                    if (sw.style.backgroundColor === 'rgb(255, 172, 232)') { // theme secondary
                        sw.style.backgroundColor = '';
                        sw.style.boxShadow = '';
                    } else {
                        sw.style.backgroundColor = '#fface8';
                        sw.style.boxShadow = '0 0 10px #fface8';
                    }
                });
            });
        });
    </script>
